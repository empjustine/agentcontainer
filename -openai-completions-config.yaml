# @see https://github.com/mostlygeek/llama-swap/blob/main/docker/config.example.yaml
# @see https://github.com/ggml-org/llama.cpp/blob/master/tools/server/README.md
# @see https://gabriel.devenyi.ca/huggingface-estimate/

healthCheckTimeout: 600
logLevel: debug
logTimeFormat: "RFC3339"
logToStdout: both
metricsMaxInMemory: 1000
logRequests: true
captureBuffer: 10
performance:
  disabled: false
  every: 10s
startPort: 5800
sendLoadingState: false
includeAliasesInList: false
globalTTL: 0
macros:
  # -ot ".ffn_.*_exps.=CPU" # offloads all MoE layers to the CPU
  # -ot ".ffn_(up|down)_exps.=CPU"
  # -ot ".ffn_(up)_exps.=CPU"
  # --no-kv-offload
  # --fit-target 1536
  # -ctk f16 -ctv q8_0
  # --fit on --fit-ctx 131072 --fit-target 768
  # --cpu-moe
  # default ollama quant: Q4_K_M
  # --cpu-range 0-7 --cpu-range-batch 0-15
  # --cpu-strict 1 --cpu-strict-batch 1
  # --threads 8 --threads-batch 16
  # --no-kv-offload
  # --fit-ctx  65536
  # --fit-ctx 131072
  # --fit-ctx 262144
  # --ctx-size 262144
  "L_PREFIX": >
    /usr/local/bin/llama-server --port ${PORT} --hf-repo ${MODEL_ID}
    --prio 2
    --no-warmup
    --no-mmproj-offload
    --no-ui
    --no-context-shift --n-predict 65536
    --fit on --fit-ctx 65536 --fit-target 1024
    --parallel 1
    --flash-attn on
    --cache-idle-slots --kv-unified --cache-ram 8192
    --cache-type-k q8_0 --cache-type-v q8_0
    --batch-size 128 --ubatch-size 128
  # https://unsloth.ai/docs/models/tutorials/devstral-2#devstral-small-2-24b
  "D_DEVSTR": >
    --temp 0.15
  # https://unsloth.ai/docs/models/qwen3.6#qwen3.6-35b-a3b
  # https://unsloth.ai/docs/models/qwen3.6#qwen3.6-27b
  # https://unsloth.ai/docs/models/qwen3.5#qwen3.5-35b-a3b
  # https://unsloth.ai/docs/models/qwen3.5#qwen3.5-27b
  "D_QWEN36": >
    --temp 0.6
    --top-p 0.95
    --top-k 20
    --repeat-penalty 1.00
    --presence-penalty 0.00
    --min-p 0.00
    --chat-template-kwargs '{"preserve_thinking": false}'
    --reasoning-budget 7000 --reasoning-budget-message "
    
    Considering the limited time by the user, I have to give the solution based on the thinking directly now.
    </think>
    
    "
  "D_NTP": ""
  "D_MTP": >
    --spec-type draft-mtp
    --spec-draft-n-max 3
  # https://unsloth.ai/docs/models/gemma-4#llama.cpp-guide
  "D_GEMMA4": >
    --temp 1.0
    --top-p 0.95
    --top-k 64
  "D_GPTOSS": >
    --temp 1.0
    --min-p 0.0
    --top-p 1.0
    --top-k 0
apiKeys:
  - "${env.LLAMASWAP_API_KEY}"
models:
  "byteshape/Devstral-Small-2-24B-Instruct-2512-GGUF:IQ4_XS":           {cmd:  "${L_PREFIX}  ${D_DEVSTR}  ${D_NTP}"}
  "byteshape/Qwen3.6-35B-A3B-GGUF:Q4_K_S":                              {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${D_NTP}"}
  "byteshape/Qwen3.6-35B-A3B-MTP-GGUF:Qwen3.6-35B-A3B-IQ4_XS-4.19bpw":  {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${D_MTP}"}
  "unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF:UD-Q8_K_XL":         {cmd:  "${L_PREFIX}  ${D_DEVSTR}  ${D_NTP}"}
  "unsloth/gemma-4-12B-it-qat-GGUF:UD-Q4_K_XL":                         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q8_K_XL":                         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-26B-A4B-it-qat-GGUF:UD-Q4_K_XL":                     {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-31B-it-GGUF:UD-Q8_K_XL":                             {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-31B-it-qat-GGUF:UD-Q4_K_XL":                         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-E2B-it-GGUF:UD-Q8_K_XL":                             {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-E2B-it-qat-GGUF:UD-Q4_K_XL":                         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-E4B-it-GGUF:UD-Q8_K_XL":                             {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gemma-4-E4B-it-qat-GGUF:UD-Q4_K_XL":                         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${D_NTP}"}
  "unsloth/gpt-oss-120b-GGUF:F16":                                      {cmd:  "${L_PREFIX}  ${D_GPTOSS}  ${D_NTP}"}
  "unsloth/gpt-oss-20b-GGUF:F16":                                       {cmd:  "${L_PREFIX}  ${D_GPTOSS}  ${D_NTP}"}
  "unsloth/Qwen3.6-27B-GGUF:UD-Q8_K_XL":                                {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${D_NTP}"}
  "unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q8_K_XL":                            {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${D_NTP}"}

