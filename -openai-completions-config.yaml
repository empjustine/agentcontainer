  #"unsloth/gemma-4-31B-it-GGUF:UD-Q8_K_XL":                      {cmd:  "${L_PREFIX}  ${D_GEMMA4}"}
  #"unsloth/gemma-4-31B-it-qat-GGUF:UD-Q4_K_XL":                  {cmd:  "${L_PREFIX}  ${D_GEMMA4}"}
  #"unsloth/gemma-4-E2B-it-qat-GGUF:UD-Q4_K_XL":                  {cmd:  "${L_PREFIX}  ${D_GEMMA4}"}
  #"unsloth/gemma-4-E4B-it-qat-GGUF:UD-Q4_K_XL":                  {cmd:  "${L_PREFIX}  ${D_GEMMA4}"}
  #"unsloth/granite-4.1-3b-GGUF:UD-Q8_K_XL":                      {cmd:  "${L_PREFIX}  ${D_GRAN41}"}
  #"unsloth/granite-4.1-8b-GGUF:UD-Q8_K_XL":                      {cmd:  "${L_PREFIX}  ${D_GRAN41}"}
  #"byteshape/Qwen3.6-35B-A3B-GGUF:Q4_K_S":                       {cmd:  "${L_PREFIX}  ${D_QWEN36}"}
