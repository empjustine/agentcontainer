# @see https://github.com/ggml-org/llama.cpp/blob/master/tools/server/README.md
# @see https://github.com/mostlygeek/llama-swap/blob/main/config.example.yaml
# @see https://github.com/mostlygeek/llama-swap/blob/main/docker/config.example.yaml
# @see https://github.com/mostlygeek/llama-swap/blob/main/docs/configuration.md
# @see https://gabriel.devenyi.ca/huggingface-estimate/
# default ollama quant: Q4_K_M

globalTTL: 0
healthCheckTimeout: 600
includeAliasesInList: false
startPort: 5800

captureBuffer: 10
logLevel: debug
logRequests: true
logTimeFormat: "RFC3339"
logToStdout: both
metricsMaxInMemory: 1000
performance:
  disabled: false
  every: 10s
sendLoadingState: false

macros:
  # -ot ".ffn_.*_exps.=CPU" # offloads all MoE layers to the CPU
  # -ot ".ffn_(up|down)_exps.=CPU"
  # -ot ".ffn_(up)_exps.=CPU"
  # --cpu-moe
  # --no-kv-offload
  "L_PREFIX": >
    llama-server
    --port ${PORT}
    --prio 2
    --log-verbosity 4

    --batch-size 512
    --log-colors off
    --no-mmproj-offload
    --no-ui
    --no-warmup
    --ubatch-size 128

    --cache-idle-slots
    --kv-unified
    --cache-ram 8192
    --flash-attn on
    --parallel 2

    --fit on
    --fit-target 1024
    --n-predict 65536
    --no-context-shift
  "ctx064":  "--fit-ctx  65536 "
  "ctx100":  "--fit-ctx 100000 "
  "ctx128":  "--fit-ctx 131072 "
  "ctx200":  "--fit-ctx 200000 "
  "ctx256":  "--fit-ctx 262144 "

  "k80v80":  "--cache-type-k q8_0 --cache-type-k-draft q8_0 --spec-draft-type-k q8_0 --cache-type-v q8_0 --cache-type-v-draft q8_0 --spec-draft-type-v q8_0"
  #"k80v60"# no llama.cpp support yet
  "k80v51":  "--cache-type-k q8_0 --cache-type-k-draft q8_0 --spec-draft-type-k q8_0 --cache-type-v q5_1 --cache-type-v-draft q5_1 --spec-draft-type-v q5_1"
  #"k60v50"# no llama.cpp support yet
  "k50v41":  "--cache-type-k q5_0 --cache-type-k-draft q5_0 --spec-draft-type-k q5_0 --cache-type-v q4_1 --cache-type-v-draft q4_1 --spec-draft-type-v q4_1"

  # https://unsloth.ai/docs/models/qwen3.6#qwen3.6-35b-a3b
  # W load_hparams: Qwen-VL models require at minimum 1024 image tokens to function correctly on grounding tasks
  # W load_hparams: if you encounter problems with accuracy, try adding --image-min-tokens 1024
  # W load_hparams: more info: https://github.com/ggml-org/llama.cpp/issues/16842
  "D_QWEN36": >
    --image-min-tokens 1024
    --temp 0.6
    --top-p 0.95
    --top-k 20
    --repeat-penalty 1.00
    --presence-penalty 0.00
    --min-p 0.00
    --chat-template-kwargs '{"preserve_thinking": true}'
  "RB16K": "--reasoning-budget 16384 --reasoning-budget-message \"\nConsidering the limited time by the user, I have to give the solution based on the thinking directly now.\n</think>.\n\n\""
  "D_DEVSTR": "--temp 0.15" # https://unsloth.ai/docs/models/tutorials/devstral-2#devstral-small-2-24b
  "D_GEMMA4": "--temp 1.0 --top-p 0.95 --top-k 64" # https://unsloth.ai/docs/models/gemma-4#llama.cpp-guide
  "D_GLM47F": "--temp 0.7 --top-p 1.0 --min-p 0.01 --repeat-penalty 1.00"
  #"MTP1": "--spec-type draft-mtp --spec-draft-n-max 1"
  #"MTP2": "--spec-type draft-mtp --spec-draft-n-max 2"
  "NOOP": ""
apiKeys:
  - "${env.LLAMASWAP_API_KEY}"
models:
  "a03b-q4-k80v80-ctx200-byteshape/Qwen3.6-35B-A3B":       {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${k80v80}  ${ctx200}  ${RB16K}  --hf-repo byteshape/Qwen3.6-35B-A3B-GGUF:Q4_K_S                       --hf-file  Qwen3.6-35B-A3B-Q4_K_S-4.22bpw.gguf"}
  "a03b-q6-k80v51-ctx128-unsloth/GLM-4.7-Flash":           {cmd:  "${L_PREFIX}  ${D_GLM47F}  ${k80v51}  ${ctx128}  ${NOOP}   --hf-repo unsloth/GLM-4.7-Flash-GGUF:Q6_K"}
  "a03b-q6-k80v80-ctx128-unsloth/Qwen3.6-35B-A3B":         {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${k80v80}  ${ctx128}  ${RB16K}  --hf-repo unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q6_K"}
  "a03b-q8-k80v51-ctx128-unsloth/GLM-4.7-Flash":           {cmd:  "${L_PREFIX}  ${D_GLM47F}  ${k80v51}  ${ctx128}  ${NOOP}   --hf-repo unsloth/GLM-4.7-Flash-GGUF:Q8_0"}
  "a03b-q8-k80v80-ctx128-unsloth/Qwen3.6-35B-A3B":         {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${k80v80}  ${ctx128}  ${RB16K}  --hf-repo unsloth/Qwen3.6-35B-A3B-GGUF:Q8_0"}
  "a04b-q4-k80v80-ctx256-unsloth/gemma-4-26B-A4B-qat":     {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k80v80}  ${ctx256}  ${NOOP}   --hf-repo unsloth/gemma-4-26B-A4B-it-qat-GGUF:UD-Q4_K_XL"}
  "a04b-q6-k80v80-ctx128-unsloth/gemma-4-26B-A4B":         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k80v80}  ${ctx128}  ${NOOP}   --hf-repo unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q6_K"}
  "a04b-q8-k80v80-ctx128-unsloth/gemma-4-26B-A4B":         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k80v80}  ${ctx128}  ${NOOP}   --hf-repo unsloth/gemma-4-26B-A4B-it-GGUF:Q8_0                        --hf-file gemma-4-26B-A4B-it-Q8_0.gguf"}
  "a12b-q4-k80v80-ctx256-unsloth/gemma-4-12b-qat":         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k80v80}  ${ctx256}  ${NOOP}   --hf-repo unsloth/gemma-4-12B-it-qat-GGUF:UD-Q4_K_XL"}
  "a12b-q6-k80v80-ctx256-unsloth/gemma-4-12b":             {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k80v80}  ${ctx256}  ${NOOP}   --hf-repo unsloth/gemma-4-12b-it-GGUF:Q6_K"}
  "a12b-q8-k80v80-ctx200-unsloth/gemma-4-12b":             {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k80v80}  ${ctx200}  ${NOOP}   --hf-repo unsloth/gemma-4-12b-it-GGUF:Q8_0                            --hf-file gemma-4-12b-it-Q8_0.gguf"}
  "a24b-q4-k80v51-ctx064-byteshape/Devstral-Small-2-24B":  {cmd:  "${L_PREFIX}  ${D_DEVSTR}  ${k80v51}  ${ctx064}  ${NOOP}   --hf-repo byteshape/Devstral-Small-2-24B-Instruct-2512-GGUF:IQ4_XS"}
  "a27b-q4-k50v41-ctx064-unsloth/Qwen3.6-27B":             {cmd:  "${L_PREFIX}  ${D_QWEN36}  ${k50v41}  ${ctx064}  ${RB16K}  --hf-repo unsloth/Qwen3.6-27B-GGUF:Q4_K_M"}
  "a31b-q4-k50v41-ctx064-unsloth/gemma-4-31B-qat":         {cmd:  "${L_PREFIX}  ${D_GEMMA4}  ${k50v41}  ${ctx064}  ${NOOP}   --hf-repo unsloth/gemma-4-31B-it-qat-GGUF:UD-Q4_K_XL"}

